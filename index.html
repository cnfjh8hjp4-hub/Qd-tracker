<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#0F172A"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Q&amp;D"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<title>Suivi Q&amp;D</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0F172A;
    --surface: #1E293B;
    --surface2: #273548;
    --border: #334155;
    --text: #F1F5F9;
    --muted: #94A3B8;
    --green: #22C55E;
    --green-bg: #14532D;
    --red: #EF4444;
    --red-bg: #7F1D1D;
    --blue: #3B82F6;
    --purple: #A855F7;
    --amber: #F59E0B;
    --radius: 12px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }

  /* LAYOUT */
  #app { display: flex; flex-direction: column; height: 100%; padding-top: var(--safe-top); }

  /* HEADER */
  .header { background: var(--surface); padding: 14px 16px 0; border-bottom: 1px solid var(--border); }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .header-title { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
  .stats-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .stat-chip { flex: 1; text-align: center; background: var(--surface2); border-radius: 8px; padding: 6px 4px; }
  .stat-num { font-size: 20px; font-weight: 800; line-height: 1; }
  .stat-label { font-size: 10px; color: var(--muted); margin-top: 1px; }

  /* TABS */
  .tabs { display: flex; gap: 2px; }
  .tab { flex: 1; padding: 10px 4px; text-align: center; font-size: 13px; font-weight: 600; color: var(--muted); border-bottom: 2px solid transparent; cursor: pointer; transition: all .15s; background: none; border-top: none; border-left: none; border-right: none; }
  .tab.active { color: var(--text); border-bottom-color: var(--blue); }
  .tab.active.purple { border-bottom-color: var(--purple); }

  /* CONTENT AREA */
  .content { flex: 1; overflow-y: auto; padding: 12px 12px calc(80px + var(--safe-bottom)); -webkit-overflow-scrolling: touch; }

  /* ITEMS */
  .item-card { background: var(--surface); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; border: 1px solid var(--border); }
  .item-card.answered { border-left: 3px solid var(--green); }
  .item-card.unanswered { border-left: 3px solid var(--red); }
  .item-card.pending { border-left: 3px solid var(--amber); }
  .item-card.archived { border-left: 3px solid var(--border); opacity: 0.75; }

  .item-body { padding: 12px 14px; }
  .item-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .item-num { font-size: 11px; font-weight: 700; color: var(--muted); }
  .item-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 99px; letter-spacing: 0.05em; }
  .badge-answered { background: #14532D; color: #4ADE80; }
  .badge-unanswered { background: #7F1D1D; color: #FCA5A5; }
  .badge-pending { background: #451A03; color: #FCD34D; }
  .badge-archived { background: var(--surface2); color: var(--muted); }
  .item-timer { font-size: 10px; color: var(--muted); margin-left: auto; }

  .item-text { font-size: 14px; line-height: 1.5; color: var(--text); word-break: break-word; }
  .item-text.done { text-decoration: line-through; color: var(--muted); }

  /* EDIT INPUT */
  .edit-input { width: 100%; background: var(--surface2); border: 1.5px solid var(--blue); color: var(--text); border-radius: 8px; padding: 8px 10px; font-size: 14px; font-family: inherit; resize: none; outline: none; }

  /* ACTION ROW */
  .item-actions { display: flex; gap: 6px; padding: 8px 14px 12px; }
  .btn-action { flex: 1; border: none; border-radius: 8px; padding: 9px 4px; font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; transition: opacity .15s; }
  .btn-action:active { opacity: 0.75; }
  .btn-green { background: var(--green); color: #fff; }
  .btn-red { background: var(--red); color: #fff; }
  .btn-icon { background: var(--surface2); color: var(--text); padding: 9px 10px; flex: 0 0 auto; }
  .btn-archive { background: var(--surface2); color: var(--amber); }
  .btn-unarchive { background: var(--surface2); color: var(--muted); }

  /* EDIT ACTIONS */
  .edit-actions { display: flex; gap: 6px; margin-top: 8px; }
  .btn-save { background: var(--blue); color: #fff; border: none; border-radius: 8px; padding: 7px 16px; font-size: 12px; font-weight: 700; cursor: pointer; }
  .btn-cancel { background: var(--surface2); color: var(--muted); border: none; border-radius: 8px; padding: 7px 14px; font-size: 12px; cursor: pointer; }

  /* FAB */
  .fab { position: fixed; bottom: calc(20px + var(--safe-bottom)); right: 20px; width: 56px; height: 56px; border-radius: 50%; background: var(--blue); color: #fff; font-size: 28px; border: none; cursor: pointer; box-shadow: 0 4px 20px rgba(59,130,246,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; transition: transform .15s; }
  .fab:active { transform: scale(0.92); }
  .fab.purple { background: var(--purple); box-shadow: 0 4px 20px rgba(168,85,247,0.5); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: flex-end; }
  .modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px 16px calc(20px + var(--safe-bottom)); width: 100%; }
  .modal-title { font-size: 16px; font-weight: 800; margin-bottom: 14px; }
  .modal-input { width: 100%; background: var(--surface2); border: 1.5px solid var(--border); color: var(--text); border-radius: 10px; padding: 12px 14px; font-size: 15px; font-family: inherit; resize: none; outline: none; }
  .modal-input:focus { border-color: var(--blue); }
  .modal-btns { display: flex; gap: 8px; margin-top: 12px; }
  .modal-submit { flex: 1; background: var(--blue); color: #fff; border: none; border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer; }
  .modal-submit.purple { background: var(--purple); }
  .modal-close { background: var(--surface2); color: var(--muted); border: none; border-radius: 10px; padding: 13px 18px; font-size: 15px; cursor: pointer; }

  /* SECTION TITLE */
  .section-title { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.1em; padding: 14px 4px 6px; text-transform: uppercase; }

  /* ARCHIVE TOGGLE */
  .archive-toggle { display: flex; align-items: center; gap: 8px; padding: 10px 4px; cursor: pointer; color: var(--muted); font-size: 13px; font-weight: 600; border: none; background: none; width: 100%; }
  .archive-toggle:active { opacity: 0.7; }

  /* EMPTY */
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
  .empty-icon { font-size: 40px; margin-bottom: 10px; }

  /* INSTALL BANNER */
  .install-banner { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin: 12px 12px 0; display: flex; align-items: center; gap: 10px; }
  .install-banner-text { flex: 1; font-size: 12px; color: var(--muted); line-height: 1.4; }
  .install-btn { background: var(--blue); color: #fff; border: none; border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }
  .install-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 2px; }

  /* Scrollbar */
  .content::-webkit-scrollbar { width: 3px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ─── DATA LAYER ───────────────────────────────────────────────
const STORAGE_KEY = 'qd-tracker-v2';

function loadDB() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { questions: [], demandes: [] };
}

function saveDB(db) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); } catch(e) {}
}

let db = loadDB();
let currentTab = 'questions';
let showArchived = { questions: false, demandes: false };
let editingId = null;
let modalOpen = false;
let deferredPrompt = null;
let showInstall = localStorage.getItem('install-dismissed') !== '1';

function getItems() { return db[currentTab]; }

function nextNum(type) {
  const all = db[type];
  if (!all.length) return 1;
  return Math.max(...all.map(i => i.num || 0)) + 1;
}

function addItem(text) {
  const item = {
    id: Date.now() + Math.random(),
    num: nextNum(currentTab),
    text: text.trim(),
    status: 'pending',   // pending | answered | unanswered
    archived: false,
    createdAt: Date.now(),
    updatedAt: Date.now(),
    history: []
  };
  db[currentTab].unshift(item);
  saveDB(db);
  render();
}

function setStatus(id, status) {
  const item = getItems().find(i => i.id === id);
  if (!item) return;
  item.history.push({ status: item.status, at: Date.now() });
  item.status = status;
  item.updatedAt = Date.now();
  saveDB(db);
  render();
}

function archiveItem(id) {
  const item = getItems().find(i => i.id === id);
  if (!item) return;
  item.archived = !item.archived;
  item.updatedAt = Date.now();
  saveDB(db);
  render();
}

function saveEdit(id, newText) {
  const item = getItems().find(i => i.id === id);
  if (!item || !newText.trim()) return;
  item.history.push({ text: item.text, at: Date.now() });
  item.text = newText.trim();
  item.updatedAt = Date.now();
  saveDB(db);
  editingId = null;
  render();
}

function formatTime(ts) {
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000);
  const h = Math.floor(m / 60);
  const d = Math.floor(h / 24);
  if (d > 0) return `${d}j`;
  if (h > 0) return `${h}h`;
  if (m > 0) return `${m}m`;
  return 'maintenant';
}

// ─── RENDER ───────────────────────────────────────────────────
function render() {
  const root = document.getElementById('app');
  const items = getItems();
  const active = items.filter(i => !i.archived);
  const archived = items.filter(i => i.archived);
  const answered = active.filter(i => i.status === 'answered').length;
  const unanswered = active.filter(i => i.status === 'unanswered').length;
  const pending = active.filter(i => i.status === 'pending').length;

  const isQ = currentTab === 'questions';
  const accentColor = isQ ? '#3B82F6' : '#A855F7';
  const typeLabel = isQ ? 'Question' : 'Demande';
  const statusA = isQ ? 'Répondu' : 'Traité';
  const statusB = isQ ? 'Non répondu' : 'Non traité';
  const statALabel = isQ ? 'Répondues' : 'Traitées';
  const statBLabel = isQ ? 'Non répondues' : 'Non traitées';

  root.innerHTML = `
    <!-- INSTALL BANNER -->
    ${showInstall && deferredPrompt ? `
    <div class="install-banner">
      <span style="font-size:22px">📲</span>
      <div class="install-banner-text">Ajouter sur l'écran d'accueil pour un accès rapide !</div>
      <button class="install-btn" onclick="installApp()">Installer</button>
      <button class="install-close" onclick="dismissInstall()">✕</button>
    </div>` : ''}
    ${showInstall && !deferredPrompt && /iPhone|iPad|iPod/.test(navigator.userAgent) ? `
    <div class="install-banner">
      <span style="font-size:22px">📲</span>
      <div class="install-banner-text">Sur iOS : appuie sur <b>Partager</b> puis <b>Sur l'écran d'accueil</b></div>
      <button class="install-close" onclick="dismissInstall()">✕</button>
    </div>` : ''}

    <!-- HEADER -->
    <div class="header">
      <div class="header-top">
        <div class="header-title">Suivi Q&amp;D</div>
        <div style="font-size:11px;color:var(--muted);">${items.length} total</div>
      </div>
      <div class="stats-row">
        <div class="stat-chip">
          <div class="stat-num" style="color:var(--green)">${answered}</div>
          <div class="stat-label">${statALabel}</div>
        </div>
        <div class="stat-chip">
          <div class="stat-num" style="color:var(--red)">${unanswered}</div>
          <div class="stat-label">${statBLabel}</div>
        </div>
        <div class="stat-chip">
          <div class="stat-num" style="color:var(--amber)">${pending}</div>
          <div class="stat-label">En attente</div>
        </div>
        <div class="stat-chip">
          <div class="stat-num" style="color:var(--muted)">${archived.length}</div>
          <div class="stat-label">Archivées</div>
        </div>
      </div>
      <div class="tabs">
        <button class="tab ${currentTab==='questions'?'active':''}" onclick="switchTab('questions')">📋 Questions</button>
        <button class="tab ${currentTab==='demandes'?'active purple':''}" onclick="switchTab('demandes')">📌 Demandes</button>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content" id="content">
      ${active.length === 0 && archived.length === 0 ? `
        <div class="empty">
          <div class="empty-icon">${isQ ? '💬' : '📌'}</div>
          Aucune ${typeLabel.toLowerCase()} pour l'instant.<br>Appuie sur + pour en ajouter.
        </div>
      ` : ''}

      ${active.length > 0 ? `
        <div class="section-title">${typeLabel}s actives (${active.length})</div>
        ${active.map(item => renderCard(item, statusA, statusB, accentColor)).join('')}
      ` : ''}

      ${archived.length > 0 ? `
        <button class="archive-toggle" onclick="toggleArchived()">
          <span>${showArchived[currentTab] ? '▼' : '▶'}</span>
          <span>Archives (${archived.length})</span>
        </button>
        ${showArchived[currentTab] ? archived.map(item => renderCard(item, statusA, statusB, accentColor)).join('') : ''}
      ` : ''}
    </div>

    <!-- FAB -->
    <button class="fab ${!isQ?'purple':''}" onclick="openModal()">+</button>

    <!-- MODAL -->
    ${modalOpen ? `
    <div class="modal-overlay" onclick="handleOverlayClick(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-title">Nouvelle ${typeLabel}</div>
        <textarea class="modal-input" id="modal-input" rows="3" placeholder="Saisir la ${typeLabel.toLowerCase()}..."></textarea>
        <div class="modal-btns">
          <button class="modal-close" onclick="closeModal()">Annuler</button>
          <button class="modal-submit ${!isQ?'purple':''}" onclick="submitModal()">Ajouter</button>
        </div>
      </div>
    </div>` : ''}
  `;

  if (modalOpen) {
    const inp = document.getElementById('modal-input');
    if (inp) { inp.focus(); inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitModal(); } }); }
  }
}

function renderCard(item, statusA, statusB, accentColor) {
  const cls = item.archived ? 'archived' : item.status === 'answered' ? 'answered' : item.status === 'unanswered' ? 'unanswered' : 'pending';
  const badgeCls = item.archived ? 'badge-archived' : item.status === 'answered' ? 'badge-answered' : item.status === 'unanswered' ? 'badge-unanswered' : 'badge-pending';
  const badgeText = item.archived ? 'Archivée' : item.status === 'answered' ? statusA : item.status === 'unanswered' ? statusB : 'En attente';
  const isEditing = editingId === item.id;
  const safeId = CSS.escape ? CSS.escape(String(item.id)) : item.id;
  const idStr = String(item.id).replace(/\./g, '_').replace(/\+/g, 'p');

  return `
  <div class="item-card ${cls}" id="card_${idStr}">
    <div class="item-body">
      <div class="item-meta">
        <span class="item-num">#${item.num}</span>
        <span class="item-badge ${badgeCls}">${badgeText}</span>
        <span class="item-timer">${formatTime(item.createdAt)}</span>
      </div>
      ${isEditing ? `
        <textarea class="edit-input" id="edit_${idStr}" rows="2">${escHtml(item.text)}</textarea>
        <div class="edit-actions">
          <button class="btn-cancel" onclick="cancelEdit()">Annuler</button>
          <button class="btn-save" onclick="doSaveEdit('${item.id}')">Sauvegarder</button>
        </div>
      ` : `
        <div class="item-text ${item.status!=='pending'&&!item.archived?'':''}">
          ${escHtml(item.text)}
        </div>
      `}
    </div>
    ${!isEditing ? `
    <div class="item-actions">
      <button class="btn-action btn-green" onclick="setStatus('${item.id}','answered')">✓ ${statusA}</button>
      <button class="btn-action btn-red" onclick="setStatus('${item.id}','unanswered')">✗ ${statusB}</button>
      <button class="btn-action btn-icon" onclick="startEdit('${item.id}')" title="Modifier">✏️</button>
      <button class="btn-action ${item.archived?'btn-unarchive':'btn-archive'}" onclick="archiveItem('${item.id}')" title="${item.archived?'Désarchiver':'Archiver'}">
        ${item.archived ? '↩' : '📦'}
      </button>
    </div>` : ''}
  </div>`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── ACTIONS ─────────────────────────────────────────────────
function switchTab(tab) { currentTab = tab; editingId = null; render(); }
function toggleArchived() { showArchived[currentTab] = !showArchived[currentTab]; render(); }
function openModal() { modalOpen = true; render(); }
function closeModal() { modalOpen = false; render(); }
function handleOverlayClick(e) { if (e.target === e.currentTarget) closeModal(); }
function submitModal() {
  const inp = document.getElementById('modal-input');
  if (inp && inp.value.trim()) { addItem(inp.value); modalOpen = false; }
}
function startEdit(id) {
  editingId = id;
  modalOpen = false;
  render();
  setTimeout(() => {
    const el = document.getElementById('edit_' + String(id).replace(/\./g,'_').replace(/\+/g,'p'));
    if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
  }, 50);
}
function cancelEdit() { editingId = null; render(); }
function doSaveEdit(id) {
  const el = document.getElementById('edit_' + String(id).replace(/\./g,'_').replace(/\+/g,'p'));
  if (el) saveEdit(id, el.value);
}

// expose to global
window.switchTab = switchTab;
window.toggleArchived = toggleArchived;
window.openModal = openModal;
window.closeModal = closeModal;
window.handleOverlayClick = handleOverlayClick;
window.submitModal = submitModal;
window.startEdit = startEdit;
window.cancelEdit = cancelEdit;
window.doSaveEdit = doSaveEdit;
window.setStatus = setStatus;
window.archiveItem = archiveItem;

// ─── PWA INSTALL ─────────────────────────────────────────────
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  render();
});
window.installApp = async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  if (outcome === 'accepted') { showInstall = false; localStorage.setItem('install-dismissed','1'); }
  render();
};
window.dismissInstall = () => {
  showInstall = false;
  localStorage.setItem('install-dismissed','1');
  render();
};

// ─── SERVICE WORKER ──────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ─── BOOT ────────────────────────────────────────────────────
render();
</script>
</body>
</html>
